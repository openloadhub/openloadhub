<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 92" role="img" aria-labelledby="title desc">
  <title id="title">OpenLoadHub mark</title>
  <desc id="desc">A hexagonal hub with a load pulse line.</desc>
  <defs>
    <linearGradient id="shell" x1="16" y1="10" x2="78" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5af5df"/>
      <stop offset="1" stop-color="#0b9879"/>
    </linearGradient>
    <linearGradient id="pulse" x1="20" y1="52" x2="75" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#45f8db"/>
      <stop offset=".52" stop-color="#1de0bb"/>
      <stop offset="1" stop-color="#0db08b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#001b17" flood-opacity=".28"/>
    </filter>
  </defs>
  <path
    d="M46 7.5 80.2 26.8v38.4L46 84.5 11.8 65.2V26.8L46 7.5Z"
    fill="#102435"
    stroke="url(#shell)"
    stroke-width="2.4"
    filter="url(#softShadow)"
  />
  <circle cx="46" cy="46" r="29.5" fill="none" stroke="#3ce5cc" stroke-opacity=".18" stroke-width="2"/>
  <path
    d="M22.5 51.8h14.3l6.4-17.7 9.7 31.4 8.1-22.9h10.8"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="6.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="22.5" cy="51.8" r="3.8" fill="#58f9df"/>
  <circle cx="71.8" cy="42.6" r="3.8" fill="#24dfba"/>
</svg>
